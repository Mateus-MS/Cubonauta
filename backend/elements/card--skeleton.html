<div>
    {{ range . }}
    <div 
        class      = "container--skeleton"
        hx-get     = "http://192.168.1.69:8080/elements/formulas"
        hx-vars    = "{id:{{.ID}}, valids:'{{.Index}}'}"
        hx-swap    = "outerHTML"
        hx-trigger = "load"
    >
        <div class="container__case--skeleton">
            <span class="container__case__name--skeleton loading"></span>
            <div class="container__case__img--skeleton loading"></div>
        </div>
        <div class="container__form--skeleton">
            <div class="container__form__holder--skeleton">
                <div class="container__form__holder__top__alg--skeleton loading"></div>
                    <div class="container__form__holder__top__tags--skeleton">
                        <div class="container__form__holder__top__tags__tag--skeleton loading" id="tag_0"></div>
                        <div class="container__form__holder__top__tags__tag--skeleton loading" id="tag_1"></div>
                        <div class="container__form__holder__top__tags__tag--skeleton loading" id="tag_2"></div>
                    </div>
                <div class="container__form__holder__bot__info--skeleton">
                    <div class="container__form__holder__bot__info__alg_name--skeleton loading"></div>
                    <div class="container__form__holder__bot__info__options--skeleton">
                        <div class="container__form__holder__bot__info__options__opt--skeleton loading"></div>
                        <div class="container__form__holder__bot__info__options__opt--skeleton loading"></div>
                    </div>
                </div>
            </div>
            <div class="container__form__bot__carrossel--skeleton loading"></div>
        </div>
    </div>
    {{ end }}

</div>
