<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">

    <style>
        *{
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>

    <title>Cubonauta</title>

    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>

</head>
<body>

    <script>
        var formula_index = 0
        document.body.addEventListener("att-ID", function(evt){
            formula_index = evt.detail.value
        })
    </script>
    
    <div id="container">

        <div id="holder"></div>

        <div 
            id         = "intersect_trigger"
            hx-get     = "http://localhost:8080/api/formulas"
            
            hx-trigger = "intersect threshold:.5"

            hx-target = "#holder"
            hx-vars   = "{'id': formula_index, 'size': 6, 'filters': 'F2L'}"
            hx-swap   = "beforeend"
        >
        </div>

    </div>

</body>
</html>
