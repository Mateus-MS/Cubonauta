<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">

    <style>
        *{
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>

    <title>Cubonauta</title>

    <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>

</head>
<body>

    <script>
        var formula_index = 4
        document.addEventListener("htmx:afterRequest", (evt)=>{
            console.log(evt)
            if(evt.detail.target.id === "holder"){
                formula_index += 1
            }
        })
    </script>
    
    <div id="container">

        <div 
            id         = "holder"
            hx-trigger = "load"
            hx-get     = "http://localhost:8080/api/formulas?id=0&size=4"
        >

        </div>

        <div 
            id         = "load_trigger"
            hx-get     = "http://localhost:8080/api/formulas"
            
            hx-trigger = "intersect threshold:.5"

            hx-target = "#holder"
            hx-vars   = "{'id': formula_index}"
            hx-swap   = "beforeend"

        >
        </div>

    </div>

</body>
</html>
